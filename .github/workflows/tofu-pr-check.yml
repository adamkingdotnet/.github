name: Reusable tofu PR check

# Reusable workflow: runs `tofu fmt`, `tofu validate`, and `tofu plan`
# against the caller's tf/ directory. Caller defines its own `on:`
# (typically pull_request with a `paths:` filter scoped to tf/**).

on:
  workflow_call:
    inputs:
      working-directory:
        description: Path to the tofu root.
        required: false
        default: tf
        type: string
      timeout-minutes:
        description: Job timeout.
        required: false
        default: 10
        type: number

permissions:
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v7
      - uses: opentofu/setup-opentofu@v2

      - run: tofu fmt -check -recursive
      - run: tofu init -backend=false
      - run: tofu validate

      - run: tofu init
      - run: tofu plan -no-color -input=false
