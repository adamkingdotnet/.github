name: Reusable worker PR check

# Reusable workflow: npm ci, optional pre-build step, then
# `tsc --noEmit` and `npm test --workspaces --if-present`. Used by
# the writer-worker monorepos (mls, pulse) where deploys go through
# Cloudflare Workers Builds and PRs only need typecheck + tests.

on:
  workflow_call:
    inputs:
      pre-build:
        description: |
          Optional shell command to run after `npm install` and before
          typecheck/test (e.g. `npm run build --workspace=@pulse/core`).
        required: false
        default: ""
        type: string
      typecheck-directory:
        description: Where to run `tsc --noEmit`.
        required: false
        default: apps/worker
        type: string
      timeout-minutes:
        description: Job timeout.
        required: false
        default: 10
        type: number

permissions:
  contents: read

jobs:
  worker:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci --no-audit --no-fund

      - name: Pre-build
        if: inputs.pre-build != ''
        env:
          PRE_BUILD: ${{ inputs.pre-build }}
        run: bash -c "$PRE_BUILD"

      - name: Typecheck
        working-directory: ${{ inputs.typecheck-directory }}
        run: npx tsc --noEmit

      - name: Test
        run: npm test --workspaces --if-present
