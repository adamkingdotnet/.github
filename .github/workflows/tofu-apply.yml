name: Reusable tofu apply

# Reusable workflow: runs `tofu apply -auto-approve` against the
# caller's tf/ directory. Caller defines its own `on:` (typically
# push to main) and concurrency group.

on:
  workflow_call:
    inputs:
      working-directory:
        description: Path to the tofu root.
        required: false
        default: tf
        type: string
      timeout-minutes:
        description: Job timeout.
        required: false
        default: 15
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  terraform:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
      - run: tofu init
      - run: tofu apply -auto-approve
