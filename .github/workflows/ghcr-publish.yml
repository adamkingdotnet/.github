name: Reusable GHCR publish

# Multi-arch buildx build + push to GHCR, tags :latest and :<sha>.
# Callers pass `secrets: inherit` (for GITHUB_TOKEN) and permissions packages:write.

on:
  workflow_call:
    inputs:
      context:
        type: string
        default: "."
      platforms:
        type: string
        default: linux/amd64,linux/arm64
      image:
        description: "Image ref without tag; empty = ghcr.io/<owner>/<repo>"
        type: string
        default: ""

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ${{ inputs.image != '' && inputs.image || format('ghcr.io/{0}', github.repository) }}
    steps:
      - uses: actions/checkout@v7
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          push: true
          platforms: ${{ inputs.platforms }}
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
