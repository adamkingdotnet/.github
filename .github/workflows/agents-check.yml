name: Agents doc check

# Reusable: assert the caller repo's AGENTS.md carries the canonical
# "working agreement" block (4 tenets + 4 operating instructions) byte-identical
# to adamkingdotnet/config (agents/working-agreement.md @main). Same drift guard
# as compose-validate's vendored-fragment check. Callers add a thin agents.yml:
#   jobs:
#     agreement:
#       uses: adamkingdotnet/.github/.github/workflows/agents-check.yml@main

on:
  workflow_call: {}

permissions:
  contents: read

jobs:
  agreement:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Working-agreement block matches config canonical
        run: |
          curl -fsSL https://raw.githubusercontent.com/adamkingdotnet/config/main/scripts/check-agreement.sh -o /tmp/check-agreement.sh
          bash /tmp/check-agreement.sh AGENTS.md
