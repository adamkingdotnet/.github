name: Reusable tofu drift check

# Reusable workflow: runs `tofu plan -detailed-exitcode` to surface
# out-of-band drift. Exit code 2 = drift detected = workflow fails =
# email to commit author. Caller defines its own schedule (typically
# weekly, staggered across repos).

on:
  workflow_call:
    inputs:
      working-directory:
        description: Path to the tofu root.
        required: false
        default: tf
        type: string
      timeout-minutes:
        description: Job timeout.
        required: false
        default: 10
        type: number

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v6
      - uses: opentofu/setup-opentofu@v2
      - run: tofu init

      - name: tofu plan -detailed-exitcode
        run: tofu plan -detailed-exitcode -no-color -input=false
